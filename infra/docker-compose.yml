services:
  mongo:
    image: mongo:7
    container_name: movie-ticket-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  rabbitmq:
    image: rabbitmq:3-management
    container_name: movie-ticket-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"

  user-service:
    build:
      context: ..
      dockerfile: user-service/Dockerfile
    container_name: user-service
    environment:
      MONGODB_URI: mongodb://mongo:27017/user_service_db
      RABBITMQ_HOST: rabbitmq
    ports:
      - "8081:8081"
    depends_on:
      - mongo
      - rabbitmq

  movie-service:
    build:
      context: ..
      dockerfile: movie-service/Dockerfile
    container_name: movie-service
    environment:
      MONGODB_URI: mongodb://mongo:27017/movie_service_db
    ports:
      - "8082:8082"
    depends_on:
      - mongo

  booking-service:
    build:
      context: ..
      dockerfile: booking-service/Dockerfile
    container_name: booking-service
    environment:
      MONGODB_URI: mongodb://mongo:27017/booking_service_db
      RABBITMQ_HOST: rabbitmq
    ports:
      - "8083:8083"
    depends_on:
      - mongo
      - rabbitmq

  payment-service:
    build:
      context: ..
      dockerfile: payment-service/Dockerfile
    container_name: payment-service
    environment:
      RABBITMQ_HOST: rabbitmq
    depends_on:
      - rabbitmq

  notification-worker:
    build:
      context: ..
      dockerfile: notification-worker/Dockerfile
    container_name: notification-worker
    environment:
      RABBITMQ_HOST: rabbitmq
    depends_on:
      - rabbitmq

  gateway:
    build:
      context: ..
      dockerfile: gateway/Dockerfile
    container_name: gateway
    environment:
      USER_SERVICE_URL: http://user-service:8081
      MOVIE_SERVICE_URL: http://movie-service:8082
      BOOKING_SERVICE_URL: http://booking-service:8083
    ports:
      - "8080:8080"
    depends_on:
      - user-service
      - movie-service
      - booking-service

volumes:
  mongo_data:
