server:
  port: 8083

spring:
  application:
    name: booking-service
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/booking_service_db}
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}

logging:
  level:
    root: INFO
